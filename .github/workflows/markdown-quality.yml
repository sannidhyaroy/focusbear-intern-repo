name: Markdown Lint and Spell Check

on:
    push:
        branches: [main, ci/**]
    pull_request:
        branches: [main]

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    markdown-quality:
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  persist-credentials: true

            - name: Check for changed markdown files
              id: changes
              uses: dorny/paths-filter@v4
              with:
                  list-files: "json"
                  filters: |
                      md:
                          - added|modified: '**/*.md'

            - name: Run markdownlint with autofix
              if: |
                  steps.changes.outputs.md == 'true' && (
                    github.event_name == 'push' || (
                      github.event_name == 'pull_request' &&
                      github.event.pull_request.head.repo.full_name == github.repository
                    )
                  )
              uses: DavidAnson/markdownlint-cli2-action@v23
              with:
                  config: .markdownlint.yaml
                  globs: ${{ steps.changes.outputs.md_files }}
                  separator: ","
                  fix: true

            - name: Run markdownlint checks
              if: |
                  steps.changes.outputs.md == 'true' && (
                    github.event_name == 'pull_request' &&
                    github.event.pull_request.head.repo.full_name != github.repository
                  )
              uses: DavidAnson/markdownlint-cli2-action@v23
              with:
                  config: .markdownlint.yaml
                  globs: ${{ steps.changes.outputs.md_files }}
                  separator: ","
                  fix: false

            - name: Run cspell
              if: |
                  !cancelled() &&
                  steps.changes.outputs.md == 'true'
              uses: streetsidesoftware/cspell-action@v8
              with:
                  files: ${{ steps.changes.outputs.md_files }}

            - name: Commit and push changes
              if: |
                  success() &&
                  steps.changes.outputs.md == 'true' && (
                    github.event_name == 'push' || (
                      github.event_name == 'pull_request' &&
                      github.event.pull_request.head.repo.full_name == github.repository
                    )
                  )
              uses: planetscale/ghcommit-action@v0.2.20
              with:
                  commit_message: "style(markdown): autofix markdown formatting [skip ci]"
                  repo: ${{ github.repository }}
                  branch: ${{ github.head_ref || github.ref_name }}
                  file_pattern: "**/*.md"
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
